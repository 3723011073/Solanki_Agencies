<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings | Solanki Agencies</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<header class="site-header">
<div class="container header-inner">
<a href="index.html" class="brand">Solanki Agencies</a>
<nav class="main-nav">
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="why.html">Why Us</a>
<a href="login.html" id="loginLink">Login</a>
<a href="signup.html" id="signupLink">Signup</a>
<a href="admin-dashboard.html" id="adminLink" style="display:none;color:#ff6b35;">Add Product</a>
<a href="#" id="logoutLink" style="display:none;color:#ff6b35;" onclick="logoutUser(event)">Logout</a>
<span id="userNameDisplay" style="color:#fff;margin-left:12px;font-weight:600;"></span>
<a href="booking.html" class="cart-link" title="View Booking">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<circle cx="9" cy="21" r="1"></circle>
<circle cx="20" cy="21" r="1"></circle>
<path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
</svg>
</a>
</nav>
</div>
</header>

<main style="padding:40px 0;">
<div class="container">

<h1 style="color:#0b3d91;margin-bottom:30px;font-size:2rem;">Your Booking History</h1>

<div style="background:#fff;padding:32px;border-radius:14px;box-shadow:0 4px 15px rgba(0,0,0,0.08);border:1px solid #e5e7eb;max-width:600px;margin-bottom:40px;">

<h2 style="color:#0b3d91;margin-bottom:20px;font-size:1.3rem;">Search Your Bookings</h2>

<div style="display:grid;gap:16px;">

<div>
<label style="display:block;margin-bottom:8px;font-weight:600;color:#1f2937;">Email Address</label>
<input type="email" id="searchEmail" placeholder="your.email@example.com" style="width:100%;padding:12px 16px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.95rem;font-family:inherit;">
</div>

<button type="button" id="searchBtn" style="background:linear-gradient(135deg, #0b3d91 0%, #1a5dc1 100%);color:#fff;padding:14px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:1rem;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(11,61,145,0.3);">Search Bookings</button>

<div id="searchMessage" style="text-align:center;margin-top:10px;font-weight:600;display:none;"></div>

</div>

</div>

<!-- Bookings List -->
<div id="bookingsContainer" style="margin-top:40px;">
<!-- Will be populated by JavaScript -->
</div>

</div>

</main>

<footer class="site-footer">
<div class="container footer-inner">
<div><strong>Solanki Agencies</strong></div>
<div><div>Email: <a href="mailto:info@solankiagencies.com">info@solankiagencies.com</a></div></div>
</div>
</footer>

<script>
// Load last used email
window.addEventListener('load', () => {
  const lastEmail = localStorage.getItem('lastBookingEmail');
  if (lastEmail) {
    document.getElementById('searchEmail').value = lastEmail;
  }
});

document.getElementById('searchBtn').addEventListener('click', async () => {
  const email = document.getElementById('searchEmail').value;
  const messageDiv = document.getElementById('searchMessage');
  
  if (!email) {
    messageDiv.textContent = '✗ Please enter your email';
    messageDiv.style.color = '#ff4757';
    messageDiv.style.display = 'block';
    return;
  }
  
  try {
    const response = await fetch(`/api/bookings/${encodeURIComponent(email)}`);
    const bookings = await response.json();
    
    const container = document.getElementById('bookingsContainer');
    
    if (bookings.length === 0) {
      container.innerHTML = `
        <div style="background:#fff;padding:32px;border-radius:14px;text-align:center;color:#6b7280;">
          <p style="font-size:1.1rem;">No bookings found for this email.</p>
        </div>
      `;
      return;
    }
    
    container.innerHTML = bookings.map((booking, idx) => {
      const b = booking.booking;
      const date = new Date(booking.createdAt).toLocaleDateString('en-IN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
      
      const total = b.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      
      return `
        <div style="background:#fff;padding:28px;border-radius:14px;box-shadow:0 4px 15px rgba(0,0,0,0.08);border:1px solid #e5e7eb;margin-bottom:20px;border-left:4px solid #0b3d91;">
          
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px;">
            <div>
              <p style="margin:0 0 4px;font-weight:600;color:#0b3d91;font-size:0.9rem;">Booking #${booking.id}</p>
              <p style="margin:0;color:#6b7280;font-size:0.85rem;">${date}</p>
            </div>
            <div style="text-align:right;">
              <p style="margin:0;color:#10b981;font-weight:700;font-size:1.3rem;">₹${total.toLocaleString()}</p>
              <p style="margin:0;color:#6b7280;font-size:0.85rem;">${b.payment}</p>
            </div>
          </div>
          
          <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #e5e7eb;">
            <p style="margin:0 0 12px;font-weight:600;color:#1f2937;">Items:</p>
            ${b.items.map(item => `
              <div style="display:flex;justify-content:space-between;padding:8px 0;color:#6b7280;font-size:0.9rem;">
                <span>${item.name} x${item.quantity}</span>
                <span>₹${(item.price * item.quantity).toLocaleString()}</span>
              </div>
            `).join('')}
          </div>
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
            <div>
              <p style="margin:0 0 4px;color:#6b7280;font-size:0.85rem;">Business</p>
              <p style="margin:0;font-weight:600;color:#1f2937;">${b.businessName}</p>
            </div>
            <div>
              <p style="margin:0 0 4px;color:#6b7280;font-size:0.85rem;">Contact</p>
              <p style="margin:0;font-weight:600;color:#1f2937;">${b.phone}</p>
            </div>
          </div>
          
          <div>
            <p style="margin:0 0 4px;color:#6b7280;font-size:0.85rem;">Delivery Address</p>
            <p style="margin:0;color:#1f2937;">${b.address}</p>
          </div>
          
        </div>
      `;
    }).join('');
    
  } catch (error) {
    const messageDiv = document.getElementById('searchMessage');
    messageDiv.textContent = '✗ Error loading bookings';
    messageDiv.style.color = '#ff4757';
    messageDiv.style.display = 'block';
  }
});

// Allow searching by pressing Enter
document.getElementById('searchEmail').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('searchBtn').click();
  }
});
</script>

</body>
</html>
