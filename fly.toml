app = "solanki-agencies-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# NOTE: Replace `app` with your Fly app name after running `flyctl apps create` or via the Fly dashboard.