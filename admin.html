<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal | Solanki Agencies</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body style="background:linear-gradient(135deg, #0b3d91 0%, #1a5dc1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;">

<div style="background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.2);padding:40px;max-width:400px;width:100%;">

<h1 style="text-align:center;color:#0b3d91;margin-bottom:30px;font-size:1.8rem;">Admin Portal</h1>

<form id="adminLoginForm" style="display:grid;gap:16px;">

<div>
<label style="display:block;margin-bottom:8px;font-weight:600;color:#1f2937;">Email</label>
<input type="email" id="adminEmail" placeholder="admin@solankiagencies.com" required style="width:100%;padding:12px 16px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.95rem;font-family:inherit;">
</div>

<div>
<label style="display:block;margin-bottom:8px;font-weight:600;color:#1f2937;">Password</label>
<input type="password" id="adminPassword" placeholder="Enter password" required style="width:100%;padding:12px 16px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.95rem;font-family:inherit;">
</div>

<button type="submit" style="background:linear-gradient(135deg, #0b3d91 0%, #1a5dc1 100%);color:#fff;padding:14px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:1rem;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(11,61,145,0.3);">Login</button>

<div id="loginError" style="color:#ff4757;text-align:center;display:none;font-weight:600;"></div>

</form>

<p style="text-align:center;margin-top:20px;color:#6b7280;font-size:0.9rem;">
Demo: admin@solankiagencies.com / admin123
</p>

</div>

<script>
document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('adminEmail').value;
  const password = document.getElementById('adminPassword').value;
  const errorDiv = document.getElementById('loginError');
  
  try {
    const response = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await response.json();
    
    if (data.ok) {
      localStorage.setItem('adminToken', data.token);
      window.location.href = 'admin-dashboard.html';
    } else {
      errorDiv.textContent = data.error || 'Login failed';
      errorDiv.style.display = 'block';
    }
  } catch (error) {
    errorDiv.textContent = 'Network error';
    errorDiv.style.display = 'block';
  }
});
</script>

</body>
</html>
